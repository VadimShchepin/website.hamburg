    <path class="fine" d="M22 0h150a22 22 0 0 1 22 22v116a22 22 0 0 1-22 22H22A22 22 0 0 1 0 138V22A22 22 0 0 1 22 0z"/>
    <rect class="line" x="43" y="46" width="108" height="70" rx="8"/>
    <path class="line" d="M43 68h108"/>
    <path class="red" d="M57 91h28v8H57z"/>
    <path class="mid" d="M116 91h21v8h-21z"/>
