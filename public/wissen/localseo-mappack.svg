  <g>
    <rect x="590" y="460" width="350" height="105" rx="14" fill="#fff" stroke="#172A45" stroke-width="2"/>
    <circle cx="628" cy="497" r="20" fill="#172A45"/>
    <text x="628" y="504" fill="#fff" font-family="sans-serif" font-size="20" font-weight="700" text-anchor="middle">3</text>
    <path d="M668 487h145M668 507h112M668 535h174" fill="none" stroke="#172A45" stroke-width="7" stroke-linecap="round" opacity=".3"/>
