<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">DSGVO-Fotoplattform: Architektur auf einem 2-vCPU-Server</title>
  <desc id="desc">Serverarchitektur mit Zugriffspfad von Eltern über QR-Code und PIN zur Token-Galerie, plus interne Container und ein externes S3-Objektspeicherziel.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0e1118"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121722"/>
      <stop offset="100%" stop-color="#0b0f16"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#e63946"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#65d98f"/>
      <stop offset="100%" stop-color="#2ecc71"/>
    </linearGradient>
    <marker id="arrowRed2" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e63946"/>
    </marker>
    <marker id="arrowGreen2" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2ecc71"/>
    </marker>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .bg { fill: url(#bg2); }
      .title { font: 700 32px Inter, system-ui, sans-serif; fill: #f2f4f8; letter-spacing: -0.02em; }
      .subtitle { font: 500 15px Inter, system-ui, sans-serif; fill: #b8c0cd; }
      .label { font: 600 15px Inter, system-ui, sans-serif; fill: #dfe5ee; }
      .small { font: 500 12px Inter, system-ui, sans-serif; fill: #b8c0cd; }
      .tiny { font: 600 11px Inter, system-ui, sans-serif; fill: #cdd4df; }
      .server { fill: url(#serverGrad); stroke: rgba(255,255,255,0.10); stroke-width: 1.6; rx: 28; }
      .container { fill: #151b27; stroke: rgba(255,255,255,0.14); stroke-width: 1.4; rx: 16; }
      .containerRed { fill: #20131a; stroke: rgba(230,57,70,0.35); stroke-width: 1.4; rx: 16; }
      .containerGreen { fill: #101b16; stroke: rgba(46,204,113,0.35); stroke-width: 1.4; rx: 16; }
      .accent { fill: #e63946; }
      .green { fill: #2ecc71; }
      .muted { fill: #8f97a7; }
      .pill { fill: rgba(230,57,70,0.12); stroke: rgba(230,57,70,0.28); stroke-width: 1; rx: 999; }
      .pill2 { fill: rgba(46,204,113,0.12); stroke: rgba(46,204,113,0.28); stroke-width: 1; rx: 999; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="675"/>
  <text class="title" x="60" y="58">DSGVO-Fotoplattform: Architektur auf einem 2-vCPU-Server</text>
  <text class="subtitle" x="60" y="84">Kompakt, nachvollziehbar, mit klar getrennten Diensten und begrenzten externen Abhängigkeiten</text>

  <!-- Main server -->
  <g filter="url(#shadow2)">
    <rect class="server" x="330" y="132" width="730" height="420" rx="30"/>
  </g>

  <text class="label" x="360" y="165">Hetzner Server</text>
  <text class="small" x="360" y="188">2 vCPU / 8 GB RAM</text>

  <rect x="960" y="206" width="72" height="48" rx="14" fill="#2ecc71" fill-opacity="0.10" stroke="#2ecc71" stroke-opacity="0.28"/>
  <text class="tiny green" x="996" y="235" text-anchor="middle">8 GB</text>

  <!-- Internal containers -->
  <g>
    <rect class="containerRed" x="360" y="220" width="210" height="86" rx="18"/>
    <text class="label" x="465" y="252" text-anchor="middle">Next.js 16</text>
    <text class="small" x="465" y="274" text-anchor="middle">Galerie, SSR, UI</text>
    <rect class="pill" x="392" y="312" width="146" height="20" rx="10"/>
    <text class="tiny accent" x="465" y="326" text-anchor="middle">Token-Authentifizierung</text>
  </g>

  <g>
    <rect class="container" x="590" y="220" width="210" height="86" rx="18"/>
    <text class="label" x="695" y="252" text-anchor="middle">Kong API-Gateway</text>
    <text class="small" x="695" y="274" text-anchor="middle">Routing, Rate-Limits, Auth</text>
  </g>

  <g>
    <rect class="container" x="820" y="220" width="210" height="86" rx="18"/>
    <text class="label" x="925" y="252" text-anchor="middle">PostgreSQL + RLS</text>
    <text class="small" x="925" y="274" text-anchor="middle">Mandanten- und Rechteprüfung</text>
  </g>

  <g>
    <rect class="containerGreen" x="360" y="334" width="210" height="86" rx="18"/>
    <text class="label" x="465" y="366" text-anchor="middle">Storage API</text>
    <text class="small" x="465" y="388" text-anchor="middle">signierte Zugriffspfade</text>
  </g>

  <g>
    <rect class="container" x="590" y="334" width="210" height="86" rx="18"/>
    <text class="label" x="695" y="366" text-anchor="middle">imgproxy</text>
    <text class="small" x="695" y="388" text-anchor="middle">nur Fallback</text>
  </g>

  <g>
    <rect class="container" x="820" y="334" width="210" height="86" rx="18"/>
    <text class="label" x="925" y="366" text-anchor="middle">Cache / Sessions</text>
    <text class="small" x="925" y="388" text-anchor="middle">kurzlebige Token</text>
  </g>

  <!-- Internal links -->
  <path d="M570 263 C580 263, 582 263, 590 263" stroke="#e63946" stroke-width="4" fill="none" marker-end="url(#arrowRed2)"/>
  <path d="M800 263 C810 263, 812 263, 820 263" stroke="#e63946" stroke-width="4" fill="none" marker-end="url(#arrowRed2)"/>
  <path d="M465 306 C465 316, 465 322, 465 334" stroke="#2ecc71" stroke-width="4" fill="none" marker-end="url(#arrowGreen2)"/>
  <path d="M570 377 C580 377, 582 377, 590 377" stroke="#2ecc71" stroke-width="4" fill="none" marker-end="url(#arrowGreen2)"/>
  <path d="M800 377 C810 377, 812 377, 820 377" stroke="#2ecc71" stroke-width="4" fill="none" marker-end="url(#arrowGreen2)"/>

  <!-- Lock icon over storage api -->
  <g transform="translate(543,344)">
    <rect x="0" y="14" width="22" height="18" rx="4" fill="#e63946"/>
    <path d="M5 14 v-5 a6 6 0 0 1 12 0 v5" fill="none" stroke="#e63946" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Access path on the left -->
  <g>
    <circle cx="96" cy="286" r="26" fill="#e63946" fill-opacity="0.12" stroke="#e63946" stroke-opacity="0.35" stroke-width="1.4"/>
    <circle cx="96" cy="276" r="8" fill="#dbe1ea"/>
    <path d="M82 304 C86 295, 106 295, 110 304" fill="none" stroke="#dbe1ea" stroke-width="4" stroke-linecap="round"/>
    <text class="label" x="96" y="336" text-anchor="middle">Eltern</text>
  </g>

  <g>
    <rect x="172" y="252" width="132" height="68" rx="18" fill="#e63946" fill-opacity="0.10" stroke="#e63946" stroke-opacity="0.28"/>
    <text class="label" x="238" y="279" text-anchor="middle">QR-Code</text>
    <text class="small" x="238" y="300" text-anchor="middle">+ PIN</text>
  </g>

  <g>
    <rect x="166" y="364" width="150" height="72" rx="20" fill="#2ecc71" fill-opacity="0.10" stroke="#2ecc71" stroke-opacity="0.28"/>
    <text class="label" x="241" y="393" text-anchor="middle">Token-Galerie</text>
    <text class="small" x="241" y="415" text-anchor="middle">gesicherter Zugriff</text>
  </g>

  <path d="M122 286 C140 286, 150 286, 172 286" stroke="#e63946" stroke-width="4" fill="none" marker-end="url(#arrowRed2)"/>
  <path d="M238 320 C238 337, 238 346, 238 364" stroke="#2ecc71" stroke-width="4" fill="none" marker-end="url(#arrowGreen2)"/>
  <path d="M316 400 C340 400, 347 400, 360 400" stroke="#2ecc71" stroke-width="5" fill="none" marker-end="url(#arrowGreen2)"/>

  <!-- External S3 cylinder -->
  <g filter="url(#shadow2)">
    <ellipse cx="1090" cy="240" rx="62" ry="18" fill="#151b27" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.4"/>
    <rect x="1028" y="240" width="124" height="126" fill="#151b27" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.4"/>
    <ellipse cx="1090" cy="366" rx="62" ry="18" fill="#121723" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.4"/>
  </g>
  <text class="label" x="1090" y="288" text-anchor="middle">Hetzner S3</text>
  <text class="small" x="1090" y="312" text-anchor="middle">WebP-Varianten</text>
  <text class="small" x="1090" y="332" text-anchor="middle">thumb 300px</text>
  <text class="small" x="1090" y="352" text-anchor="middle">cover 800px</text>
  <text class="small" x="1090" y="372" text-anchor="middle">full 1920px</text>

  <path d="M1030 302 C1006 302, 978 302, 820 302" stroke="#e63946" stroke-width="4" fill="none" marker-end="url(#arrowRed2)"/>
  <rect x="840" y="420" width="240" height="34" rx="17" class="pill2"/>
  <text class="tiny green" x="960" y="442" text-anchor="middle">Objektspeicher für performante Bildvarianten</text>

  <!-- Footer note -->
  <text class="small" x="60" y="618">Keine direkte Exponierung des Speichers. Zugriff nur über Token, Gateway und streng begrenzte Pfade.</text>
</svg>
