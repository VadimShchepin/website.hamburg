<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Conversion-Rate verdoppeln</title>
  <desc id="desc">Gleiche 1.000 Besucher erzeugen bei einer Conversion-Rate von einem Prozent 10 Anfragen und bei zwei Prozent 20 Anfragen.</desc>
  <defs>
    <style>
      text{font-family:Arial,sans-serif;fill:#0A192F}
      .label{font-size:22px;font-weight:700;letter-spacing:.3px}
      .small{font-size:16px;font-weight:700;letter-spacing:1.2px}
      .number{font-size:34px;font-weight:700}
      .white{fill:#fff}
      .accent{fill:#E53935}
      .stroke{fill:none;stroke:#0A192F;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .soft{fill:none;stroke:#172A45;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .red{fill:none;stroke:#E53935;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
    </style>
    <g id="visitor">
      <circle cx="0" cy="-7" r="5" fill="#172A45"/>
      <path d="M-8 9c0-6 3-10 8-10s8 4 8 10" class="soft"/>
    </g>
    <g id="mail">
      <rect x="-13" y="-9" width="26" height="18" rx="3" fill="#F5F7FA" stroke="#0A192F" stroke-width="2"/>
      <path d="m-11-6 11 8 11-8" class="stroke" stroke-width="2"/>
    </g>
    <g id="mail-red">
      <rect x="-13" y="-9" width="26" height="18" rx="3" fill="#E53935" stroke="#E53935" stroke-width="2"/>
      <path d="m-10-6 10 8 10-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <path d="M71 91h1058" class="soft" opacity=".18"/>
  <text x="600" y="61" text-anchor="middle" class="small">CONVERSION-MATHE</text>

  <g aria-label="Szenario mit einem Prozent Conversion Rate">
    <rect x="70" y="120" width="460" height="390" rx="30" fill="#F5F7FA"/>
    <text x="300" y="165" text-anchor="middle" class="label">1.000 Besucher</text>
    <g transform="translate(130 210)">
      <use href="#visitor" x="0"/><use href="#visitor" x="40"/><use href="#visitor" x="80"/><use href="#visitor" x="120"/><use href="#visitor" x="160"/><use href="#visitor" x="200"/><use href="#visitor" x="240"/><use href="#visitor" x="280"/><use href="#visitor" x="320"/>
      <use href="#visitor" x="0" y="42"/><use href="#visitor" x="40" y="42"/><use href="#visitor" x="80" y="42"/><use href="#visitor" x="120" y="42"/><use href="#visitor" x="160" y="42"/><use href="#visitor" x="200" y="42"/><use href="#visitor" x="240" y="42"/><use href="#visitor" x="280" y="42"/><use href="#visitor" x="320" y="42"/>
    </g>
    <path d="M300 287v42m-9-10 9 10 9-10" class="soft"/>
    <circle cx="300" cy="366" r="35" fill="#172A45"/>
    <text x="300" y="375" text-anchor="middle" font-size="24" font-weight="700" class="white">1%</text>
    <g transform="translate(188 427)">
      <use href="#mail" x="0"/><use href="#mail" x="56"/><use href="#mail" x="112"/><use href="#mail" x="168"/><use href="#mail" x="224"/>
      <use href="#mail" x="0" y="38"/><use href="#mail" x="56" y="38"/><use href="#mail" x="112" y="38"/><use href="#mail" x="168" y="38"/><use href="#mail" x="224" y="38"/>
    </g>
    <text x="300" y="555" text-anchor="middle" class="number">10 Anfragen</text>
  </g>

  <g aria-label="Szenario mit zwei Prozent Conversion Rate">
    <rect x="670" y="120" width="460" height="390" rx="30" fill="#F5F7FA" stroke="#E53935" stroke-width="3"/>
    <text x="900" y="165" text-anchor="middle" class="label">1.000 Besucher</text>
    <g transform="translate(730 210)">
      <use href="#visitor" x="0"/><use href="#visitor" x="40"/><use href="#visitor" x="80"/><use href="#visitor" x="120"/><use href="#visitor" x="160"/><use href="#visitor" x="200"/><use href="#visitor" x="240"/><use href="#visitor" x="280"/><use href="#visitor" x="320"/>
      <use href="#visitor" x="0" y="42"/><use href="#visitor" x="40" y="42"/><use href="#visitor" x="80" y="42"/><use href="#visitor" x="120" y="42"/><use href="#visitor" x="160" y="42"/><use href="#visitor" x="200" y="42"/><use href="#visitor" x="240" y="42"/><use href="#visitor" x="280" y="42"/><use href="#visitor" x="320" y="42"/>
    </g>
    <path d="M900 287v42m-9-10 9 10 9-10" class="red"/>
    <circle cx="900" cy="366" r="35" fill="#E53935"/>
    <text x="900" y="375" text-anchor="middle" font-size="24" font-weight="700" class="white">2%</text>
    <g transform="translate(704 420)">
      <use href="#mail-red" x="0"/><use href="#mail-red" x="44"/><use href="#mail-red" x="88"/><use href="#mail-red" x="132"/><use href="#mail-red" x="176"/><use href="#mail-red" x="220"/><use href="#mail-red" x="264"/><use href="#mail-red" x="308"/><use href="#mail-red" x="352"/><use href="#mail-red" x="396"/>
      <use href="#mail-red" x="0" y="38"/><use href="#mail-red" x="44" y="38"/><use href="#mail-red" x="88" y="38"/><use href="#mail-red" x="132" y="38"/><use href="#mail-red" x="176" y="38"/><use href="#mail-red" x="220" y="38"/><use href="#mail-red" x="264" y="38"/><use href="#mail-red" x="308" y="38"/><use href="#mail-red" x="352" y="38"/><use href="#mail-red" x="396" y="38"/>
    </g>
    <text x="900" y="555" text-anchor="middle" class="number accent">20 Anfragen</text>
  </g>

  <g aria-label="Verdopplung">
    <circle cx="600" cy="315" r="58" fill="#0A192F"/>
    <text x="600" y="329" text-anchor="middle" font-size="42" font-weight="700" class="white">2x</text>
    <path d="M551 315h-32m162 0h-32m22-10 10 10-10 10" class="stroke"/>
  </g>

  <g transform="translate(600 625)">
    <path d="M-340 0h680" class="soft" opacity=".18"/>
    <rect x="-270" y="-31" width="540" height="62" rx="31" fill="#fff"/>
    <text x="0" y="7" text-anchor="middle" font-size="23" font-weight="700">
      gleiche Besucher, <tspan class="accent">doppelt so viele Anfragen</tspan>
    </text>
  </g>
</svg>
