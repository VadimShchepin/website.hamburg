<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Website-Besucher werden zu Anfragen</title>
  <desc id="desc">Ein Besucherstrom läuft durch einen Conversion-Trichter in einem Browserfenster und wird zu Kontaktformularen und Telefonanrufen.</desc>
  <defs>
    <clipPath id="screen">
      <rect x="430" y="218" width="740" height="472" rx="18"/>
    </clipPath>
    <g id="person" fill="#FFFFFF" stroke="#172A45" stroke-width="5">
      <circle cx="0" cy="-11" r="9"/>
      <path d="M-14 18c1-15 7-22 14-22s13 7 14 22" stroke-linecap="round"/>
    </g>
    <g id="spark" fill="#E53935">
      <path d="M0-14 4-4 14 0 4 4 0 14-4 4-14 0-4-4Z"/>
    </g>
  </defs>

  <!-- Incoming visitor stream -->
  <path d="M108 182C238 181 311 207 407 273" fill="none" stroke="#172A45" stroke-width="3" stroke-linecap="round" stroke-dasharray="5 15"/>
  <path d="M89 277c139-13 233 9 332 58" fill="none" stroke="#172A45" stroke-width="3" stroke-linecap="round" stroke-dasharray="5 15"/>
  <path d="M154 375c115-14 192-8 270 22" fill="none" stroke="#172A45" stroke-width="3" stroke-linecap="round" stroke-dasharray="5 15"/>
  <g>
    <use href="#person" transform="translate(122 142)"/>
    <use href="#person" transform="translate(204 170)"/>
    <use href="#person" transform="translate(287 190)"/>
    <use href="#person" transform="translate(101 239)"/>
    <use href="#person" transform="translate(183 263)"/>
    <use href="#person" transform="translate(270 278)"/>
    <use href="#person" transform="translate(355 299)"/>
    <use href="#person" transform="translate(150 343)"/>
    <use href="#person" transform="translate(242 359)"/>
    <use href="#person" transform="translate(335 375)"/>
  </g>

  <!-- Browser window -->
  <rect x="401" y="188" width="798" height="532" rx="30" fill="#F5F7FA" stroke="#0A192F" stroke-width="7"/>
  <path d="M405 266h790" fill="none" stroke="#0A192F" stroke-width="7"/>
  <circle cx="447" cy="227" r="8" fill="#E53935"/>
  <circle cx="478" cy="227" r="8" fill="#172A45"/>
  <circle cx="509" cy="227" r="8" fill="#172A45"/>
  <rect x="557" y="211" width="562" height="31" rx="15.5" fill="#FFFFFF" stroke="#172A45" stroke-width="4"/>
  <path d="M583 226h174" fill="none" stroke="#172A45" stroke-width="4" stroke-linecap="round"/>

  <!-- Funnel inside browser -->
  <g clip-path="url(#screen)">
    <path d="M421 302H1143L930 495v132l-125 63H680l-10-63V495Z" fill="#FFFFFF" stroke="#0A192F" stroke-width="6" stroke-linejoin="round"/>
    <path d="M421 302h722l-51 47H472Z" fill="#172A45"/>
    <path d="M516 389h532M577 441h414M670 496h225" fill="none" stroke="#172A45" stroke-width="4" stroke-linecap="round" stroke-dasharray="6 15"/>
    <g fill="#172A45">
      <circle cx="469" cy="324" r="7"/><circle cx="504" cy="324" r="7"/><circle cx="539" cy="324" r="7"/>
      <circle cx="574" cy="324" r="7"/><circle cx="609" cy="324" r="7"/><circle cx="644" cy="324" r="7"/>
      <circle cx="679" cy="324" r="7"/><circle cx="714" cy="324" r="7"/><circle cx="749" cy="324" r="7"/>
      <circle cx="784" cy="324" r="7"/><circle cx="819" cy="324" r="7"/><circle cx="854" cy="324" r="7"/>
      <circle cx="889" cy="324" r="7"/><circle cx="924" cy="324" r="7"/><circle cx="959" cy="324" r="7"/>
      <circle cx="994" cy="324" r="7"/><circle cx="1029" cy="324" r="7"/><circle cx="1064" cy="324" r="7"/>
      <circle cx="1099" cy="324" r="7"/>
      <circle cx="544" cy="402" r="7"/><circle cx="599" cy="402" r="7"/><circle cx="654" cy="402" r="7"/>
      <circle cx="709" cy="402" r="7"/><circle cx="764" cy="402" r="7"/><circle cx="819" cy="402" r="7"/>
      <circle cx="874" cy="402" r="7"/><circle cx="929" cy="402" r="7"/><circle cx="984" cy="402" r="7"/>
      <circle cx="629" cy="459" r="7"/><circle cx="695" cy="459" r="7"/><circle cx="761" cy="459" r="7"/>
      <circle cx="827" cy="459" r="7"/><circle cx="893" cy="459" r="7"/><circle cx="959" cy="459" r="7"/>
    </g>
    <g fill="#E53935">
      <circle cx="719" cy="522" r="8"/><circle cx="783" cy="522" r="8"/><circle cx="847" cy="522" r="8"/>
      <circle cx="746" cy="573" r="8"/><circle cx="817" cy="573" r="8"/>
      <circle cx="782" cy="625" r="10"/>
    </g>
  </g>

  <!-- Conversion flow -->
  <path d="M800 721c49 46 101 60 169 61m-169-61c70 2 122-20 175-72" fill="none" stroke="#E53935" stroke-width="5" stroke-linecap="round" stroke-dasharray="7 16"/>
  <circle cx="800" cy="721" r="13" fill="#E53935"/>

  <!-- Contact form outcome -->
  <g transform="translate(976 574)">
    <rect width="288" height="208" rx="24" fill="#FFFFFF" stroke="#0A192F" stroke-width="6"/>
    <path d="M0 48h288" fill="none" stroke="#0A192F" stroke-width="6"/>
    <circle cx="28" cy="24" r="6" fill="#E53935"/>
    <circle cx="52" cy="24" r="6" fill="#172A45"/>
    <path d="M35 82h90M35 111h218M35 140h155" fill="none" stroke="#172A45" stroke-width="5" stroke-linecap="round"/>
    <rect x="171" y="161" width="82" height="24" rx="12" fill="#E53935"/>
    <path d="m206 173 10 0m0 0-5-5m5 5-5 5" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Phone outcome -->
  <g transform="translate(1307 479)">
    <circle cx="76" cy="76" r="74" fill="#FFFFFF" stroke="#0A192F" stroke-width="6"/>
    <circle cx="76" cy="76" r="56" fill="#F5F7FA"/>
    <path d="M48 42c6-6 16-5 21 1l12 15c4 5 3 12-1 16l-9 8c8 15 18 25 33 33l8-9c4-4 11-5 16-1l15 12c6 5 7 15 1 21l-7 7c-9 9-23 12-35 7-31-12-55-36-67-67-5-12-2-26 7-35Z" fill="#E53935"/>
  </g>

  <!-- Supporting geometry -->
  <use href="#spark" transform="translate(1320 704)"/>
  <use href="#spark" transform="translate(1425 642) scale(.7)"/>
  <path d="M1347 762h105M1372 790h56" fill="none" stroke="#172A45" stroke-width="5" stroke-linecap="round"/>
  <circle cx="1469" cy="761" r="7" fill="#E53935"/>
  <path d="M303 511h72m-36-36v72M212 600h46" fill="none" stroke="#172A45" stroke-width="4" stroke-linecap="round"/>
  <circle cx="309" cy="655" r="8" fill="#E53935"/>
</svg>
