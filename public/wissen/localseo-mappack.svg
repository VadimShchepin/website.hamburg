      <path d="m690 525 4 8 9 1-7 6 2 9-8-5-8 5 2-9-7-6 9-1Z"/>
      <path d="m712 525 4 8 9 1-7 6 2 9-8-5-8 5 2-9-7-6 9-1Z"/>
      <path d="m734 525 4 8 9 1-7 6 2 9-8-5-8 5 2-9-7-6 9-1Z"/>
