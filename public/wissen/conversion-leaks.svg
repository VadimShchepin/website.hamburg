<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Conversion-Killer im Website-Funnel</title>
  <desc id="desc">Ein Trichter zeigt, wie Besucher durch unklare Navigation, versteckte Kontaktdaten, lange Formulare, langsame Ladezeiten und fehlendes Vertrauen verloren gehen. Nur wenige erreichen die Anfrage.</desc>
  <defs>
    <marker id="red-arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M1 1l6 3-6 3Z" fill="#E53935"/>
    </marker>
    <marker id="green-arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M1 1l6 3-6 3Z" fill="#2E9E6B"/>
    </marker>
  </defs>

  <!-- Funnel -->
  <path d="M360 72h480l-38 92H398Z" fill="#172A45"/>
  <path d="M398 174h404l-42 88H440Z" fill="#F5F7FA" stroke="#172A45" stroke-width="3"/>
  <path d="M440 272h320l-40 84H480Z" fill="#FFFFFF" stroke="#172A45" stroke-width="3"/>
  <path d="M480 366h240l-38 80H518Z" fill="#F5F7FA" stroke="#172A45" stroke-width="3"/>
  <path d="M518 456h164l-28 72H546Z" fill="#FFFFFF" stroke="#172A45" stroke-width="3"/>
  <path d="M546 538h108v38H546Z" fill="#172A45"/>
  <path d="M398 164h404M440 262h320M480 356h240M518 446h164M546 528h108" fill="none" stroke="#FFFFFF" stroke-width="7"/>

  <!-- Visitor stream -->
  <g fill="#FFFFFF">
    <circle cx="418" cy="118" r="8"/><circle cx="455" cy="118" r="8"/><circle cx="492" cy="118" r="8"/>
    <circle cx="529" cy="118" r="8"/><circle cx="566" cy="118" r="8"/><circle cx="603" cy="118" r="8"/>
    <circle cx="640" cy="118" r="8"/><circle cx="677" cy="118" r="8"/><circle cx="714" cy="118" r="8"/>
    <circle cx="751" cy="118" r="8"/><circle cx="788" cy="118" r="8"/>
  </g>
  <text x="600" y="48" fill="#0A192F" font-family="sans-serif" font-size="24" font-weight="700" text-anchor="middle">Besucher</text>
  <path d="M600 56v25" fill="none" stroke="#172A45" stroke-width="3" stroke-linecap="round"/>

  <!-- Leak paths -->
  <g fill="none" stroke="#E53935" stroke-width="4" stroke-linecap="round" stroke-dasharray="5 9" marker-end="url(#red-arrow)">
    <path d="M434 210c-50 0-69-20-99-46"/>
    <path d="M766 304c49 0 69-18 100-43"/>
    <path d="M494 395c-50 0-72 18-105 42"/>
    <path d="M698 476c53 0 74-19 106-42"/>
    <path d="M550 505c-49 0-69 20-99 43"/>
  </g>
  <g fill="#E53935">
    <path d="M348 174c0-10 12-22 12-22s12 12 12 22a12 12 0 1 1-24 0Z"/>
    <path d="M835 270c0-9 11-20 11-20s11 11 11 20a11 11 0 1 1-22 0Z"/>
    <path d="M403 426c0-9 11-20 11-20s11 11 11 20a11 11 0 1 1-22 0Z"/>
    <path d="M774 446c0-9 11-20 11-20s11 11 11 20a11 11 0 1 1-22 0Z"/>
    <path d="M464 538c0-9 11-20 11-20s11 11 11 20a11 11 0 1 1-22 0Z"/>
  </g>

  <!-- Maze navigation -->
  <g transform="translate(175 102)">
    <rect width="150" height="116" rx="16" fill="#F5F7FA" stroke="#E53935" stroke-width="3"/>
    <path d="M32 27h48v20H58v20h48v22H82V76H44V47H32Zm63 0h23v40h-12M32 89h35" fill="none" stroke="#0A192F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="32" cy="27" r="6" fill="#E53935"/>
    <path d="m112 83 9 6-9 6" fill="none" stroke="#E53935" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Hidden phone -->
  <g transform="translate(875 205)">
    <rect width="150" height="116" rx="16" fill="#F5F7FA" stroke="#E53935" stroke-width="3"/>
    <path d="M46 31c4-4 10-3 13 1l10 13c3 4 2 9-1 12l-7 6c7 12 15 20 27 27l6-7c3-3 8-4 12-1l13 10c4 3 5 9 1 13l-5 5c-7 7-18 9-28 5-25-10-44-29-54-54-4-10-2-21 5-28Z" fill="none" stroke="#0A192F" stroke-width="5" stroke-linejoin="round"/>
    <path d="M28 98 122 19" fill="none" stroke="#E53935" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Long form -->
  <g transform="translate(225 369)">
    <rect width="150" height="116" rx="16" fill="#F5F7FA" stroke="#E53935" stroke-width="3"/>
    <path d="M45 20h47l20 20v58H45Z" fill="#FFFFFF" stroke="#0A192F" stroke-width="4" stroke-linejoin="round"/>
    <path d="M92 20v21h20M58 52h40M58 64h40M58 76h40M58 88h25" fill="none" stroke="#172A45" stroke-width="4" stroke-linecap="round"/>
    <path d="m119 72 9 9 9-9m-9 9V48" fill="none" stroke="#E53935" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Slow loading -->
  <g transform="translate(820 369)">
    <rect width="150" height="116" rx="16" fill="#F5F7FA" stroke="#E53935" stroke-width="3"/>
    <circle cx="75" cy="59" r="34" fill="#FFFFFF" stroke="#0A192F" stroke-width="5"/>
    <path d="M75 37v24l17 11M75 17v9M75 92v9M33 59h9M108 59h9" fill="none" stroke="#172A45" stroke-width="5" stroke-linecap="round"/>
    <path d="M110 29a48 48 0 0 1 11 19" fill="none" stroke="#E53935" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Broken trust -->
  <g transform="translate(285 508)">
    <rect width="150" height="116" rx="16" fill="#F5F7FA" stroke="#E53935" stroke-width="3"/>
    <path d="M75 18c13 10 27 13 40 14v25c0 24-15 37-40 47-25-10-40-23-40-47V32c13-1 27-4 40-14Z" fill="#FFFFFF" stroke="#0A192F" stroke-width="5" stroke-linejoin="round"/>
    <path d="M65 49c1-9 17-12 23-5 7 9-4 14-10 18-3 2-3 5-3 8M75 84h.1" fill="none" stroke="#E53935" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Successful conversion -->
  <path d="M574 579v26M600 579v26M626 579v26" fill="none" stroke="#2E9E6B" stroke-width="4" stroke-linecap="round" stroke-dasharray="3 7" marker-end="url(#green-arrow)"/>
  <g transform="translate(520 610)">
    <rect width="160" height="48" rx="24" fill="#2E9E6B"/>
    <path d="M34 16h30v20H34Zm0 1 15 11 15-11" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="m78 25 7 7 13-15" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="126" y="31" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="700" text-anchor="middle">Anfrage</text>
  </g>
</svg>
