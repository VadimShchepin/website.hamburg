<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Das N+1-Problem bei signierten URLs</title>
  <desc id="desc">Vergleich zwischen einem chaotischen Vorher-Fluss mit tausenden HTTP-Requests und einem gebündelten Nachher-Fluss mit Batch-Requests.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#10131b"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#11141c"/>
      <stop offset="100%" stop-color="#0d1016"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e63946" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#56d68a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.15"/>
    </linearGradient>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e63946"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#52c878"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .bg { fill: url(#bgGrad); }
      .panel { fill: url(#panelGrad); stroke: rgba(255,255,255,0.08); stroke-width: 1.5; }
      .title { font: 700 34px Inter, system-ui, sans-serif; fill: #f2f4f8; letter-spacing: -0.02em; }
      .panelTitle { font: 700 22px Inter, system-ui, sans-serif; fill: #f2f4f8; }
      .label { font: 600 16px Inter, system-ui, sans-serif; fill: #dbe1ea; }
      .small { font: 500 13px Inter, system-ui, sans-serif; fill: #b8c0cd; }
      .micro { font: 600 12px Inter, system-ui, sans-serif; fill: #d9dee7; }
      .box { fill: #131823; stroke: rgba(255,255,255,0.12); stroke-width: 1.5; rx: 18; }
      .boxRed { fill: #20141a; stroke: rgba(230,57,70,0.45); stroke-width: 1.6; rx: 18; }
      .boxGreen { fill: #111c17; stroke: rgba(82,200,120,0.42); stroke-width: 1.6; rx: 18; }
      .textRed { fill: #ff8a94; }
      .textGreen { fill: #9ff0bc; }
      .muted { fill: #8d96a6; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="675"/>

  <text class="title" x="60" y="58">Das N+1-Problem bei signierten URLs</text>
  <text class="small" x="60" y="86">Vergleich: individuelles Signieren pro Foto vs. gebündelte Batch-Erzeugung</text>

  <g filter="url(#shadow)">
    <rect class="panel" x="50" y="110" width="520" height="485" rx="26"/>
    <rect class="panel" x="630" y="110" width="520" height="485" rx="26"/>
  </g>

  <text class="panelTitle" x="78" y="148">Vorher</text>
  <text class="panelTitle" x="658" y="148">Nachher</text>

  <!-- Left panel: chaotic N+1 -->
  <g transform="translate(0,0)">
    <!-- browser -->
    <g>
      <rect class="boxRed" x="80" y="190" width="150" height="92" rx="18"/>
      <circle cx="105" cy="212" r="6" fill="#e63946"/>
      <circle cx="124" cy="212" r="6" fill="#ff8a94"/>
      <circle cx="143" cy="212" r="6" fill="#ffb3bc"/>
      <text class="label textRed" x="155" y="246" text-anchor="middle">Browser</text>
      <text class="micro muted" x="155" y="266" text-anchor="middle">Galerie lädt Fotos</text>
    </g>
    <!-- nextjs -->
    <g>
      <rect class="boxRed" x="272" y="190" width="145" height="92" rx="18"/>
      <text class="label textRed" x="345" y="236" text-anchor="middle">Next.js</text>
      <text class="micro muted" x="345" y="256" text-anchor="middle">signiert einzeln</text>
    </g>
    <!-- kong -->
    <g>
      <rect class="boxRed" x="450" y="190" width="95" height="92" rx="18"/>
      <text class="micro muted" x="497.5" y="228" text-anchor="middle">Kong</text>
      <text class="label textRed" x="497.5" y="250" text-anchor="middle">Gateway</text>
    </g>
    <!-- storage api -->
    <g>
      <rect class="boxRed" x="395" y="365" width="150" height="92" rx="18"/>
      <text class="label textRed" x="470" y="410" text-anchor="middle">Storage API</text>
      <text class="micro muted" x="470" y="430" text-anchor="middle">JWT + Pfad pro Foto</text>
    </g>

    <!-- arrows -->
    <path d="M230 236 C250 236, 255 236, 272 236" stroke="#e63946" stroke-width="4" fill="none" marker-end="url(#arrowRed)"/>
    <path d="M417 236 C435 236, 438 236, 450 236" stroke="#e63946" stroke-width="4" fill="none" marker-end="url(#arrowRed)"/>
    <path d="M497 282 C496 314, 494 332, 488 365" stroke="#e63946" stroke-width="4" fill="none" marker-end="url(#arrowRed)"/>

    <!-- fan-out -->
    <g stroke="#e63946" stroke-width="1.8" fill="none" opacity="0.9">
      <path d="M470 411 C440 395, 430 375, 410 350" marker-end="url(#arrowRed)"/>
      <path d="M470 411 C456 392, 455 374, 449 350" marker-end="url(#arrowRed)"/>
      <path d="M470 411 C472 392, 474 375, 480 350" marker-end="url(#arrowRed)"/>
      <path d="M470 411 C488 392, 495 377, 510 350" marker-end="url(#arrowRed)"/>
      <path d="M470 411 C505 393, 518 372, 534 350" marker-end="url(#arrowRed)"/>
      <path d="M470 411 C420 416, 402 413, 395 411" marker-end="url(#arrowRed)"/>
      <path d="M470 411 C430 429, 414 441, 405 452" marker-end="url(#arrowRed)"/>
      <path d="M470 411 C476 437, 480 447, 492 457" marker-end="url(#arrowRed)"/>
      <path d="M470 411 C518 425, 529 438, 541 455" marker-end="url(#arrowRed)"/>
    </g>

    <!-- Notes -->
    <text class="label textRed" x="140" y="346">1.204 Fotos × 2 URLs = 2.408 HTTP-Requests</text>
    <text class="small" x="108" y="378" fill="#f3b0b8">Viele kleine Aufrufe, hoher Overhead, unruhiger Datenfluss</text>
    <text class="small" x="118" y="500" fill="#f3b0b8">≈ ~2.408 Requests nur für URL-Signaturen</text>
  </g>

  <!-- Right panel: batched -->
  <g>
    <rect class="boxGreen" x="660" y="190" width="150" height="92" rx="18"/>
    <circle cx="688" cy="212" r="6" fill="#52c878"/>
    <circle cx="707" cy="212" r="6" fill="#7ee3a4"/>
    <circle cx="726" cy="212" r="6" fill="#a8f0c0"/>
    <text class="label textGreen" x="735" y="246" text-anchor="middle">Browser</text>
    <text class="micro muted" x="735" y="266" text-anchor="middle">ruhiger Zugriff</text>

    <rect class="boxGreen" x="852" y="190" width="145" height="92" rx="18"/>
    <text class="label textGreen" x="924" y="236" text-anchor="middle">Next.js</text>
    <text class="micro muted" x="924" y="256" text-anchor="middle">createSignedUrls()</text>

    <rect class="boxGreen" x="1030" y="190" width="95" height="92" rx="18"/>
    <text class="micro muted" x="1077.5" y="228" text-anchor="middle">Kong</text>
    <text class="label textGreen" x="1077.5" y="250" text-anchor="middle">Gateway</text>

    <rect class="boxGreen" x="930" y="365" width="150" height="92" rx="18"/>
    <text class="label textGreen" x="1005" y="410" text-anchor="middle">Storage API</text>
    <text class="micro muted" x="1005" y="430" text-anchor="middle">Batch-Signatur pro Pfadliste</text>

    <path d="M810 236 C828 236, 835 236, 852 236" stroke="#52c878" stroke-width="5" fill="none" marker-end="url(#arrowGreen)"/>
    <path d="M997 236 C1014 236, 1020 236, 1030 236" stroke="#52c878" stroke-width="5" fill="none" marker-end="url(#arrowGreen)"/>
    <path d="M1078 282 C1076 312, 1072 332, 1068 365" stroke="#52c878" stroke-width="5" fill="none" marker-end="url(#arrowGreen)"/>

    <rect x="775" y="286" width="270" height="52" rx="14" fill="#2ecc71" fill-opacity="0.10" stroke="#2ecc71" stroke-opacity="0.25"/>
    <text class="label textGreen" x="910" y="317" text-anchor="middle">~12 Batch-Requests (je 200 Pfade)</text>
    <text class="small" x="702" y="502" fill="#a8f0c0">Wenige, dicke Aufrufe. Bessere Cache-Nutzung. Deutlich weniger Latenz.</text>
  </g>

  <!-- Bottom strip -->
  <g>
    <rect x="60" y="612" width="1080" height="40" rx="14" fill="#101521" stroke="#ffffff" stroke-opacity="0.08"/>
    <text class="label" x="600" y="638" text-anchor="middle">
      Antwortzeit:
      <tspan fill="#ff8a94"> mehrere Sekunden </tspan>
      <tspan fill="#dbe1ea">→</tspan>
      <tspan fill="#9ff0bc"> 0,98 s</tspan>
    </text>
  </g>
</svg>
