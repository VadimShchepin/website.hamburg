      <path class="navy" d="M705 455h62v7h-62z"/>
      <path class="mid" d="M705 474h39v5h-39z"/>
      <circle class="navy" cx="789" cy="468" r="12"/>
      <path d="M784 468h10m-5-5v10" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
