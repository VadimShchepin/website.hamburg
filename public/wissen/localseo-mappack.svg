  <path d="M200 300 300 245l83 46 92-65 85 41M200 457l102-70 83 34 92-76 83 38M270 198l19 367M429 198l-8 367" fill="none" stroke="#172A45" stroke-width="12" opacity=".12"/>
  <path d="M200 345h360M350 198l-4 367" fill="none" stroke="#fff" stroke-width="18"/>
  <path d="M200 345h360M350 198l-4 367" fill="none" stroke="#172A45" stroke-width="2" stroke-dasharray="8 10" opacity=".3"/>

  <!-- Pins -->
