  <!-- small ambient data marks -->
  <g class="fine" opacity=".45">
    <path d="M79 284h72m-36-36v72M1084 277h58m-29-29v58"/>
    <circle cx="282" cy="291" r="7"/><circle cx="914" cy="590" r="7"/>
