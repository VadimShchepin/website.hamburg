<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Connected e-commerce ecosystem</title>
  <desc id="desc">A central online storefront connected to payment, delivery, analytics, automation, and search modules.</desc>
  <defs>
    <style>
      .line{fill:none;stroke:#0A192F;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .fine{fill:none;stroke:#172A45;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
      .dash{fill:none;stroke:#172A45;stroke-width:2;stroke-linecap:round;stroke-dasharray:3 11}
      .navy{fill:#0A192F}.mid{fill:#172A45}.dark{fill:#020C1B}.paper{fill:#F5F7FA}.white{fill:#FFFFFF}.red{fill:#E53935}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0A192F" flood-opacity=".1"/>
    </filter>
  </defs>

  <!-- ecosystem connections -->
  <g class="dash" opacity=".6">
    <path d="M381 280C302 241 272 195 237 158"/>
    <path d="M356 371C270 379 225 405 176 447"/>
    <path d="M435 515C388 566 345 586 295 601"/>
    <path d="M819 280C894 235 925 193 963 155"/>
    <path d="M844 371C933 379 974 411 1022 451"/>
  </g>
  <g class="navy">
    <circle cx="381" cy="280" r="4"/><circle cx="356" cy="371" r="4"/><circle cx="435" cy="515" r="4"/>
    <circle cx="819" cy="280" r="4"/><circle cx="844" cy="371" r="4"/>
  </g>

  <!-- payment module -->
  <g transform="translate(142 78)" filter="url(#shadow)">
