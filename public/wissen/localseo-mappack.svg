<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Google Local Map Pack diagram</title>
  <desc id="desc">Search bar, map with three numbered pins, three local business results, and a 42 percent click share callout.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0A192F" flood-opacity=".12"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="160" y="70" width="820" height="535" rx="28" fill="#fff" stroke="#172A45" stroke-width="3"/>
  </g>

  <!-- Search bar -->
  <rect x="200" y="105" width="740" height="66" rx="33" fill="#F5F7FA" stroke="#172A45" stroke-width="2"/>
  <circle cx="240" cy="138" r="12" fill="none" stroke="#0A192F" stroke-width="4"/>
  <path d="m249 147 12 12" fill="none" stroke="#0A192F" stroke-width="4" stroke-linecap="round"/>
  <path d="M290 129h250M290 146h170" fill="none" stroke="#172A45" stroke-width="6" stroke-linecap="round" opacity=".28"/>
  <circle cx="895" cy="138" r="4" fill="#172A45"/>
  <circle cx="910" cy="138" r="4" fill="#172A45"/>

  <!-- Map -->
